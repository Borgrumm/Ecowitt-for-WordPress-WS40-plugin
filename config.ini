; Ecowitt-Upload V2 configuration

; Strongly recommended: 
; store config.ini outside the public web folder and set:
;	Apache: SetEnv ECOWITT_CONFIG /secure/path/ecowitt-config.ini
; or use/add an .htaccess file to the ecowitt-loader folder with the following line:
;	<Files "config.ini">
;		Require all denied
;	</Files>
; to keep this file private as it contains the gateway PASSKEY.

; for the first run, you must set:
;	expected_passkey = ""
;	redact_passkey_in_outputs = true
; so you will be able to receive the ecowitt passkey.
; after that write the passkey in:
;	expected_passkey = "YOUR_PASSKEY_HERE"
; and set:
;	redact_passkey_in_outputs = false



[security]
; Leave empty only for the very first test, then paste the gateway PASSKEY.
expected_passkey = ""

; Set this value to false once the PASSKEY is configured.
; It prevents the secret from being written into latest.json and raw daily logs.
redact_passkey_in_outputs = true

[general]
; This value allow to directly transform the time value received to a suitable locations.
; It must be set to a PHP/IANA standard value like "UTC" / "UTC+2" / "Europe/Paris"
timezone = "Europe/Paris"
; Set to true to add the raw data to the latest.json file
include_raw_payload = true

; Adds profile.metric_source_keys to latest.json.
; Useful while adding new sensors; you may turn it off later if you want a slimmer file.
include_source_keys = true

[paths]
; Relative paths are resolved from the folder containing ecowitt-upload.php.
data_dir = "data"
log_dir = "log"
mapping_file = "ecowitt-map.json"

[logging]
write_action_log = true
write_raw_daily_log = true
log_unknown_keys = true

[realtime]
;enable or disable realtime.txt file creation
enabled = false
; none    = do not generate realtime.txt from this script
; require = include generate-realtime.php after latest.json creation
; curl    = call the URL below after latest.json creation
mode = "none"
; Name of the script to run after this code if called via the require methode
script = "generate-realtime.php"
; Url of the script to run if called via curl methode
url = "http://your-server.com/your-path/generate-realtime.php"
curl_timeout = 10
